<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modular One | Maintenance</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-gray-50 h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center border border-gray-100">
      <!-- Icon -->
      <div class="mb-6 flex justify-center">
        <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
      </div>

      <!-- Content -->
      <h1 class="text-2xl font-bold text-gray-900 mb-2">We're Upgrading</h1>
      <p class="text-gray-500 mb-8 leading-relaxed">
        Modular One is currently undergoing scheduled maintenance to improve your experience. We will be back online shortly.
      </p>

      <!-- Button/Link -->
      <a href="mailto:support@modularone.com" class="inline-block px-6 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition duration-200">
        Contact Support
      </a>
    </div>

  </body>
</html>
